<h2 mat-dialog-title>{{description}}</h2>

<mat-dialog-content>

  <h4>Would you like to remove this city from favorites?</h4>
  <h5>{{city.cityName}}</h5>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-raised-button mat-dialog-close (click)="close()">CLOSE</button>
  <button mat-raised-button color="primary" mat-button mat-dialog-close="true" (click)="save()">SAVE</button>
</mat-dialog-actions>
