<h2 mat-dialog-title>Confirm!</h2>

<mat-dialog-content>
  <h3>Are you sure that you want to delete this image?</h3>

</mat-dialog-content>
<mat-progress-bar mode="indeterminate" *ngIf="isDeleting"></mat-progress-bar>

<mat-dialog-actions align="end">
  <button mat-raised-button color="primary" [mat-dialog-close]="true" (click)="onSave()">DELETE</button>
  <button mat-raised-button mat-dialog-close mat-dialog-close="false">CLOSE</button>
</mat-dialog-actions>
