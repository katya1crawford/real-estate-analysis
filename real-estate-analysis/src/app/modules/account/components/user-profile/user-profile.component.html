<mat-card>
  <mat-card-header>
    <mat-card-title>User Info</mat-card-title>
    <mat-card-subtitle>You May Change/Update/Delete Your Information</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <form class="container" [formGroup]="profileForm">
      <mat-form-field appearance="fill">
        <mat-label>First Name</mat-label>
        <input matInput formControlName="firstName">
      </mat-form-field>
      <mat-form-field appearance="fill">
        <mat-label>Last Name</mat-label>
        <input matInput formControlName="lastName">
      </mat-form-field>
      <mat-form-field appearance="fill">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email">
      </mat-form-field>
      <mat-form-field appearance="fill">
        <mat-label>Password</mat-label>
        <input matInput formControlName="password">
      </mat-form-field>
    </form>
  </mat-card-content>
  <mat-card-actions align="end">
    <button mat-raised-button (click)=" onUpdate()">UPDATE</button>
    <button mat-raised-button color="warn" (click)="onDelete()">
      <mat-icon>delete</mat-icon>DELETE
    </button>
  </mat-card-actions>
</mat-card>
