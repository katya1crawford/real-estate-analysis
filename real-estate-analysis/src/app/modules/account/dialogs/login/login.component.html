<h3 mat-dialog-title>Log In</h3>
<mat-dialog-content>

  <div class="container">
    <form [formGroup]="loginForm">
      <div class="form-input">
        <mat-form-field appearance="fill">
          <mat-label>Enter your email</mat-label>
          <input matInput placeholder="youremail@example.com" formControlName="email" required>
          <button mat-icon-button matSuffix>
            <mat-icon>email</mat-icon>
          </button>
          <mat-error *ngIf="this.loginForm.controls.email.invalid">*Invalid email</mat-error>
        </mat-form-field>
      </div>
      <div class="form-input">
        <mat-form-field appearance="fill">
          <mat-label>Enter your password</mat-label>
          <input matInput [type]="hide ? 'password' : 'text'" formControlName="password" required>
          <button mat-icon-button matSuffix (click)="hide = !hide" [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hide">
            <mat-icon>{{hide ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          <mat-error *ngIf="password.invalid">*Invalid password</mat-error>
        </mat-form-field>
      </div>

    </form>
  </div>
  <span>
    <div *ngIf="serverError" color="warn">{{ errorMessage }}</div>
  </span>
  <span><a [routerLink]="'account/reset-password'" class="custom-small" mat-dialog-close="false">Forgot Password</a> </span>
  <mat-progress-bar *ngIf="this.isLoading" mode="indeterminate"></mat-progress-bar>

</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-raised-button mat-dialog-close="false">CLOSE</button>
  <button mat-raised-button color="accent" (click)="onLoginFormSubmit()">LOG IN</button>
</mat-dialog-actions>
